<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bannière LinkedIn – Yan Berdin</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1584px;
            height: 396px;
            overflow: hidden;
            font-family: 'Segoe UI', 'Inter', Arial, sans-serif;
        }

        .banner {
            width: 1584px;
            height: 396px;
            background: linear-gradient(135deg, #0d1b4b 0%, #1a3a8f 40%, #1565c0 70%, #0288d1 100%);
            position: relative;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        /* --- Fond décoratif : grille de points --- */
        .dots-grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.07) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        /* --- Cercles lumineux d'ambiance --- */
        .glow-top {
            position: absolute;
            top: -80px;
            right: 250px;
            width: 420px;
            height: 420px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(2, 188, 209, 0.18) 0%, transparent 70%);
        }

        .glow-bottom {
            position: absolute;
            bottom: -120px;
            left: 80px;
            width: 350px;
            height: 350px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(21, 101, 192, 0.25) 0%, transparent 70%);
        }

        /* --- Tag code décoratif gauche --- */
        .code-tag {
            position: absolute;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.18;
        }

        .code-tag span {
            font-size: 52px;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: -2px;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        /* --- Ligne verticale gauche accent --- */
        .accent-bar {
            position: absolute;
            left: 130px;
            top: 40px;
            bottom: 40px;
            width: 3px;
            background: linear-gradient(180deg, transparent, #f59e0b, #f59e0b, transparent);
            border-radius: 2px;
        }

        /* --- Conteneur principal centré --- */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 165px;
            padding-right: 60px;
            height: 100%;
            flex: 1;
        }

        /* --- Titre principal --- */
        .title {
            font-size: 46px;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: -0.5px;
            line-height: 1.1;
            text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
        }

        .title .dot-sep {
            color: #f59e0b;
            margin: 0 6px;
        }

        /* --- Séparateur --- */
        .divider {
            margin: 14px 0 12px 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, rgba(245, 158, 11, 0.7), rgba(255, 255, 255, 0.08) 60%, transparent);
        }

        /* --- Sous-titre XP --- */
        .xp-line {
            font-size: 22px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.88);
            letter-spacing: 0.2px;
            text-shadow: 0 1px 8px rgba(0, 0, 0, 0.2);
        }

        .xp-line .highlight {
            color: #fbbf24;
            font-weight: 700;
        }

        /* --- Badges technologies --- */
        .tech-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
        }

        .badge {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            padding: 5px 14px;
            border-radius: 20px;
            backdrop-filter: blur(4px);
            letter-spacing: 0.3px;
        }

        .badge.orange {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.5);
            color: #fbbf24;
        }

        /* --- Colonne droite : CTA portfolio --- */
        .cta-col {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding-right: 56px;
            min-width: 220px;
        }

        .cta-available {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.75);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            padding: 5px 16px;
            border-radius: 20px;
        }

        .cta-box {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0d1b4b;
            font-size: 15px;
            font-weight: 800;
            padding: 13px 24px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 24px rgba(245, 158, 11, 0.45);
            line-height: 1.3;
        }

        .cta-box .url {
            font-size: 13px;
            font-weight: 600;
            opacity: 0.85;
            margin-top: 3px;
            display: block;
        }

        /* --- Icône globe --- */
        .globe-icon {
            font-size: 18px;
            margin-right: 6px;
        }
    </style>
</head>

<body>
    <div class="banner">
        <!-- Fond -->
        <div class="dots-grid"></div>
        <div class="glow-top"></div>
        <div class="glow-bottom"></div>

        <!-- Décoration gauche -->
        <div class="code-tag">
            <span>&lt;/&gt;</span>
        </div>
        <div class="accent-bar"></div>

        <!-- Contenu principal -->
        <div class="content">
            <div class="title">
                Développeur React<span class="dot-sep">·</span>Next.js<span class="dot-sep">·</span>TypeScript
            </div>

            <div class="divider"></div>

            <div class="xp-line">
                <span class="highlight">10 ans</span> d'expérience e-commerce
                <span class="dot-sep" style="color:#f59e0b; margin:0 8px;">·</span>
                <span class="highlight">15 000</span> commandes/an gérées
            </div>

            <div class="tech-row">
                <span class="badge orange">React</span>
                <span class="badge orange">Next.js</span>
                <span class="badge orange">TypeScript</span>
                <span class="badge">Laravel</span>
                <span class="badge">Node.js</span>
                <span class="badge">PostgreSQL</span>
                <span class="badge">Docker</span>
            </div>
        </div>

        <!-- CTA Droite -->
        <div class="cta-col">
            <div class="cta-available">✦ Disponible</div>
            <div class="cta-box">
                <span class="globe-icon">🌐</span>Portfolio
                <span class="url">www.yanberdin.com</span>
            </div>
        </div>
    </div>
</body>

</html>
